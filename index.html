<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="To Do List">
    <link rel="apple-touch-icon" href="download (1).png">
<link rel="icon" type="image/png" href="download (1).png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PWA Install Banner -->
    <div class="install-bar" id="installBar">
        <span><i class="fas fa-mobile-alt"></i> Install the app on your device</span>
        <div class="install-btns">
            <button id="installBtn">Install</button>
            <button id="dismissBtn"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="container">
        <h1><i class="fas fa-check-double"></i> To Do List</h1>

        <div class="input-row">
            <label for="datePicker"><i class="fas fa-calendar-alt"></i> Date</label>
            <input type="date" id="datePicker">
        </div>

        <div class="input-row task-row">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button id="addTaskButton"><i class="fas fa-plus"></i> Add</button>
        </div>
    </div>

    <div class="section1">
        <h3><span class="dot dot-orange"></span> Uncompleted Tasks</h3>
        <hr>
        <ul id="UncompletedTasks"></ul>
        <p class="empty-msg" id="emptyUncompleted">No pending tasks 🎉</p>
    </div>

    <div class="section2">
        <h3><span class="dot dot-green"></span> Completed Tasks</h3>
        <hr>
        <ul id="completedtasks"></ul>
        <p class="empty-msg" id="emptyCompleted">No completed tasks yet</p>
    </div>

    <footer>
        <p>&copy; By Peter Emad 2025</p>
        <a href="https://www.linkedin.com/in/peter-emad-4911a9328/" target="_blank">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
